name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시할 때마다 실행 (테마/코드 변경)
  push:
    branches: [ main ]
  # 문서 저장소(document-repo) 푸시 시 자동 트리거 (repository_dispatch)
  repository_dispatch:
    types: [ content-updated ]
  # 수동으로도 실행 가능
  workflow_dispatch:

# GitHub Pages에 배포할 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site code
        uses: actions/checkout@v7

      - name: Checkout private content (document-repo)
        uses: actions/checkout@v7
        with:
          repository: Salvia95/document-repo
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: document-repo
          persist-credentials: false

      - name: Setup pnpm
        # v6 은 package.json 의 packageManager(pnpm@8.15.4) 를 따르므로 version 입력 제거
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Build site
        run: pnpm run build
        env:
          # import-content.js 가 이 경로의 문서 저장소에서 publish:true 문서를 가져온다
          DOCS_LOCAL_PATH: document-repo
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5